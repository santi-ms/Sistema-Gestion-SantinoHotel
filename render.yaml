databases:
  - name: hotel-santino-db
    plan: free
    databaseName: hotel_santino
    user: hotel_santino

services:
  - type: web
    name: hotel-santino-backend
    runtime: python
    plan: free
    region: oregon
    rootDir: backend/hotel-santino-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn hotel:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hotel-santino-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9
